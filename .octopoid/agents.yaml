paused: false

queue_limits:
  max_claimed: 3
  max_incoming: 20
  max_provisional: 10

agents:
  implementer:
    role: implement
    spawn_mode: scripts
    max_instances: 3
    interval_seconds: 60
    max_turns: 150
    model: sonnet
    agent_dir: .octopoid/agents/implementer

  sanity-check-gatekeeper:
    role: gatekeeper
    spawn_mode: scripts
    claim_from: provisional
    interval_seconds: 120
    max_turns: 50
    model: sonnet
    agent_dir: .octopoid/agents/gatekeeper
    max_instances: 1

  qa-gatekeeper:
    role: gatekeeper
    spawn_mode: scripts
    claim_from: sanity_approved
    interval_seconds: 120
    max_turns: 80
    model: sonnet
    agent_dir: .octopoid/agents/qa-gatekeeper
    max_instances: 1

  breakdown:
    role: breakdown
    max_instances: 1
    interval_seconds: 120
    max_turns: 30
    model: sonnet
    paused: true
